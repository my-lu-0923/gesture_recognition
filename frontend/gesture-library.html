<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/gesture-library.css">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">🤟</div>
            <h2>手语交互系统</h2>
            <p>AI智能版 v1.0</p>
        </div>
        <div class="user-info">
            <div class="avatar" id="avatar">用</div>
            <div class="user-details">
                <div class="user-name" id="username">加载中...</div>
                <div class="user-email" id="userEmail">加载中...</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="dashboard.html">
                        <span class="icon">🏠</span>
                        <span>手语实时翻译</span>
                    </a>
                </li>
                <li>
                    <a href="voice-translation.html">
                        <span class="icon">🎤</span>
                        <span>手语演示生成</span>
                    </a>
                </li>
                <li>
                    <a href="upload-recognition.html">
                        <span class="icon">⬆️</span>
                        <span>图片视频识别</span>
                    </a>
                </li>
                <li>
                    <a href="ai-assistant.html">
                        <span class="icon">🤖</span>
                        <span>AI 助手</span>
                    </a>
                </li>
                <li>
                    <a href="history.html">
                        <span class="icon">📊</span>
                        <span>识别历史</span>
                    </a>
                </li>
                <li>
                    <a href="learning-stats.html">
                        <span class="icon">📈</span>
                        <span>学习统计</span>
                    </a>
                </li>
                <li class="active">
                    <a href="gesture-library.html">
                        <span class="icon">📚</span>
                        <span>手势库</span>
                    </a>
                </li>
                <li>
                    <a href="profile.html">
                        <span class="icon">👤</span>
                        <span>个人中心</span>
                    </a>
                </li>
                <li>
                    <a href="about.html">
                        <span class="icon">ℹ️</span>
                        <span>关于我们</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="#" id="logoutBtn" class="logout-btn">
                <span class="icon">🚪</span>
                <span>退出登录</span>
            </a>
        </div>
    </aside>
    <main class="main-content">
        <div class="top-nav"><div class="page-title"><h1>手势库</h1><p>后端接口：/api/gesture-library</p></div></div>
        <div class="table-container">
            <table>
                <thead><tr><th>手势</th><th>分类</th><th>难度</th><th>学习次数</th><th>掌握等级</th></tr></thead>
                <tbody id="libraryBody"></tbody>
            </table>
        </div>
    </main>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/gesture-library.js"></script>
<script>
    async function checkLogin() {
        try {
            const isLoggedIn = await auth.checkAuth();
            if (!isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }
            const user = auth.getUser();
            if (user) {
                document.getElementById('username').textContent = user.name;
                document.getElementById('avatar').textContent = user.avatar;
                document.getElementById('userEmail').textContent = user.email || user.name;
            }
        } catch(err) {
            console.error('检查登录失败:', err);
            window.location.href = 'login.html';
        }
    }

    const logoutBtn = document.querySelector('.logout-btn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            await auth.logout();
        });
    }

    checkLogin();
</script>
</body>
</html>
