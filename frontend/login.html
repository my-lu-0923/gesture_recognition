<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 手语交互系统</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-page">
<div class="auth-shell">
    <div class="auth-hero">
        <div class="logo">🤟</div>
        <h1>欢迎回来</h1>
        <p>手语交互系统 · 智能版</p>
    </div>

    <form class="auth-form" id="loginForm">
        <div class="form-group">
            <label>用户名 / 邮箱</label>
            <input type="text" id="username" placeholder="请输入用户名" value="demo">
        </div>

        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" value="123456">
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
        </div>
    </form>

    <div class="auth-footer">
        <p>还没有账号？ <a href="register.html">立即注册</a></p>
        <p style="margin-top: 8px;">💡 请使用已注册的账号登录</p>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        console.log('=== 登录页面加载完成 ===');
        
        // 如果已经登录，直接跳转到 dashboard
        if (auth.isAuthenticated) {
            console.log('⚡ 检测到已登录，直接跳转到 dashboard');
            window.location.replace('dashboard.html');
            return;
        }

        const form = document.getElementById('loginForm');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            console.log('=== 登录请求 ===');
            console.log('用户名:', username);

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            // 显示加载状态
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '登录中...';
            submitBtn.disabled = true;

            try {
                const result = await auth.login(username, password);
                console.log('登录结果:', result);

                if (result.success) {
                    console.log('✅ 登录成功，准备跳转到 dashboard...');
                    // 登录成功后，直接跳转
                    window.location.replace('dashboard.html');
                } else {
                    alert(result.error || '登录失败');
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('❌ 登录异常:', error);
                alert('登录失败: ' + error.message);
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
