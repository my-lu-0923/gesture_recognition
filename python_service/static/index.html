<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能手语翻译系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .content {
            display: flex;
            flex-wrap: wrap;
            padding: 30px;
            gap: 30px;
        }

        .camera-section {
            flex: 1;
            min-width: 300px;
        }

        .result-section {
            flex: 1;
            min-width: 300px;
        }

        .video-container {
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #video {
            width: 100%;
            height: auto;
            background: #000;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .card {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .card-title {
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .card-content {
            font-size: 1.2em;
            color: #2d3748;
            word-break: break-word;
        }

        .gesture-sequence {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .gesture-badge {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        .history-item {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 14px;
        }

        .history-time {
            color: #a0aec0;
            font-size: 12px;
        }

        .llm-badge {
            display: inline-block;
            background: #48bb78;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }

        .status-online {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-offline {
            background: #fed7d7;
            color: #742a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤟 智能手语翻译系统</h1>
            <p>混合模式 | 实时规则翻译 | 按需LLM精准翻译</p>
            <div>
                <span id="llmStatus" class="status status-offline">LLM: 检测中...</span>
            </div>
        </div>

        <div class="content">
            <div class="camera-section">
                <div class="video-container">
                    <video id="video" autoplay playsinline muted></video>
                </div>
                <div class="controls">
                    <button id="startBtn" class="btn-primary">📷 开启摄像头</button>
                    <button id="stopBtn" class="btn-danger" disabled>⏹️ 停止</button>
                    <button id="clearBtn" class="btn-warning">🗑️ 清空</button>
                </div>
                <div class="controls">
                    <button id="quickTranslateBtn" class="btn-primary">⚡ 快速翻译</button>
                    <button id="llmTranslateBtn" class="btn-success">🤖 LLM精准翻译</button>
                </div>
            </div>

            <div class="result-section">
                <div class="card">
                    <div class="card-title">🎯 当前手势</div>
                    <div class="card-content" id="currentGesture">等待识别...</div>
                </div>

                <div class="card">
                    <div class="card-title">📝 手势序列</div>
                    <div class="gesture-sequence" id="gestureSequence">
                        <span style="color: #a0aec0;">暂无手势</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">⚡ 快速翻译 <span style="font-size:12px">(规则模式)</span></div>
                    <div class="card-content" id="quickTranslation">等待翻译...</div>
                </div>

                <div class="card">
                    <div class="card-title">
                        🤖 LLM精准翻译
                        <span id="llmBadge" class="llm-badge">未加载</span>
                    </div>
                    <div class="card-content" id="llmTranslation">点击"LLM精准翻译"按钮</div>
                    <div id="translationTime" style="font-size:12px; color:#a0aec0; margin-top:10px;"></div>
                </div>

                <div class="card">
                    <div class="card-title">📜 翻译历史</div>
                    <div id="historyContainer">
                        <div class="history-item" style="color:#a0aec0;">暂无历史</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM元素
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const clearBtn = document.getElementById('clearBtn');
        const quickTranslateBtn = document.getElementById('quickTranslateBtn');
        const llmTranslateBtn = document.getElementById('llmTranslateBtn');

        const currentGestureEl = document.getElementById('currentGesture');
        const gestureSequenceEl = document.getElementById('gestureSequence');
        const quickTranslationEl = document.getElementById('quickTranslation');
        const llmTranslationEl = document.getElementById('llmTranslation');
        const translationTimeEl = document.getElementById('translationTime');
        const historyContainer = document.getElementById('historyContainer');
        const llmStatusEl = document.getElementById('llmStatus');
        const llmBadgeEl = document.getElementById('llmBadge');

        let stream = null;
        let sessionId = 'web_' + Date.now();
        let frameInterval = null;
        let isStreaming = false;

        // 初始化
        async function init() {
            await checkLLMStatus();
            setInterval(sendFrame, 200); // 5fps
        }

        // 检查LLM状态
        async function checkLLMStatus() {
            try {
                const res = await fetch('/llm/status');
                const data = await res.json();

                if (data.available) {
                    llmStatusEl.textContent = 'LLM: 已加载';
                    llmStatusEl.className = 'status status-online';
                    llmBadgeEl.textContent = '已加载';
                    llmBadgeEl.style.background = '#48bb78';
                } else {
                    llmStatusEl.textContent = 'LLM: 未加载';
                    llmStatusEl.className = 'status status-offline';
                    llmBadgeEl.textContent = '未加载';
                    llmBadgeEl.style.background = '#ed8936';
                }
            } catch(e) {
                console.error('检查LLM状态失败', e);
            }
        }

        // 开启摄像头
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                isStreaming = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
            } catch(e) {
                alert('无法开启摄像头: ' + e.message);
            }
        }

        // 停止摄像头
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                video.srcObject = null;
                isStreaming = false;
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }

        // 发送帧进行识别
        async function sendFrame() {
            if (!isStreaming || !video.videoWidth) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/jpeg', 0.8);

            try {
                const res = await fetch('/recognize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: imageData,
                        session_id: sessionId
                    })
                });

                const data = await res.json();

                // 更新UI
                if (data.current_gesture) {
                    currentGestureEl.innerHTML = `${data.current_gesture} <span style="font-size:12px; color:#a0aec0;">(${Math.round(data.confidence * 100)}%)</span>`;
                } else {
                    currentGestureEl.textContent = '等待手势...';
                }

                // 更新手势序列
                if (data.gesture_sequence && data.gesture_sequence.length > 0) {
                    gestureSequenceEl.innerHTML = data.gesture_sequence.map(g =>
                        `<span class="gesture-badge">${g}</span>`
                    ).join('');
                } else {
                    gestureSequenceEl.innerHTML = '<span style="color:#a0aec0;">暂无手势</span>';
                }

                // 更新快速翻译
                if (data.quick_translation) {
                    quickTranslationEl.textContent = data.quick_translation;
                }

            } catch(e) {
                console.error('识别失败', e);
            }
        }

        // 快速翻译
        async function quickTranslate() {
            try {
                const res = await fetch('/translate/rule', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const data = await res.json();
                if (data.success) {
                    quickTranslationEl.textContent = data.translation;
                    addToHistory('⚡', data.translation);
                }
            } catch(e) {
                alert('翻译失败: ' + e.message);
            }
        }

        // LLM精准翻译
        async function llmTranslate() {
            llmTranslationEl.textContent = '翻译中...';
            translationTimeEl.textContent = '';

            const startTime = Date.now();

            try {
                const res = await fetch('/translate/llm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const data = await res.json();
                const elapsed = Date.now() - startTime;

                if (data.success) {
                    llmTranslationEl.textContent = data.translation;
                    translationTimeEl.textContent = `⏱️ 耗时: ${elapsed}ms`;
                    addToHistory('🤖', data.translation, elapsed);
                } else {
                    llmTranslationEl.textContent = '翻译失败: ' + (data.error || '未知错误');
                }
            } catch(e) {
                llmTranslationEl.textContent = '翻译失败: ' + e.message;
            }
        }

        // 清空序列
        async function clearSequence() {
            try {
                await fetch(`/session/${sessionId}/clear`, { method: 'POST' });
                gestureSequenceEl.innerHTML = '<span style="color:#a0aec0;">暂无手势</span>';
                currentGestureEl.textContent = '等待识别...';
                quickTranslationEl.textContent = '等待翻译...';
                llmTranslationEl.textContent = '点击"LLM精准翻译"按钮';
                translationTimeEl.textContent = '';
            } catch(e) {
                console.error('清空失败', e);
            }
        }

        // 添加到历史
        function addToHistory(mode, text, elapsed = null) {
            const time = new Date().toLocaleTimeString();
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <div><strong>${mode}</strong> ${text}</div>
                <div class="history-time">${time}${elapsed ? ` | ⏱️ ${elapsed}ms` : ''}</div>
            `;
            historyContainer.insertBefore(item, historyContainer.firstChild);

            // 保持最多10条
            while (historyContainer.children.length > 10) {
                historyContainer.removeChild(historyContainer.lastChild);
            }
        }

        // 事件绑定
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
        clearBtn.addEventListener('click', clearSequence);
        quickTranslateBtn.addEventListener('click', quickTranslate);
        llmTranslateBtn.addEventListener('click', llmTranslate);

        // 启动
        init();

        // 定期检查LLM状态
        setInterval(checkLLMStatus, 30000);
    </script>
</body>
</html>
