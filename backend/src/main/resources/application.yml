# 静态资源
web:
  resources:
    static-locations: classpath:/static/,file:./frontend/
    add-mappings: true

# 会话配置
session:
  timeout: 3600  # 会话超时时间（秒）

# 自定义配置
app:
  python:
    script-path: ../python_service/recognize.py
  llm:
    enabled: false