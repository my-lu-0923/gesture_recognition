# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /
    session:
      timeout: 3600

python:
  service:
    url: http://localhost:5001
    timeout: 30000

# 日志配置
logging:
  level:
    com.sign: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

spring:
  application:
    name: sign-language-system
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/sign_language?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ef0d8726
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  thymeleaf:
    enabled: false


