<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 手语交互系统</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-page">
    <div class="auth-shell">
        <div class="auth-hero">
            <div class="logo">🤟</div>
            <h1>欢迎回来</h1>
            <p>手语交互系统 · 智能版</p>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="email" placeholder="请输入邮箱" value="demo@example.com">
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" value="123456">
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
            </div>
        </form>

        <div class="auth-footer">
        <p>还没有账号？ <a href="register.html">立即注册</a></p>
        <p style="margin-top: 8px;">💡 请使用已注册的账号登录</p>
    </div>
    </div>

    <script>
        // document.getElementById('loginForm').addEventListener('submit', (e) => {
        //     e.preventDefault();
        //     // 模拟登录成功，跳转到主页面
        //     window.location.href = 'dashboard.html';
        // });
        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    // 跳转到 about 页面
                    window.location.href = data.redirect || '/about';
                } else {
                    alert(data.message);
                }
            } catch(err) {
                alert('登录失败: ' + err.message);
            }
        });
    </script>
</body>
</html>
